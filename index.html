document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rm:rotate(.6deg);}}\n.intro-center{position:relative;text-align:center;z-index:3;padding:24px;}\n.intro-emblem{width:min(72vw,470px);height:auto;filter:drop-shadow(0 12px 26px rgba(0,0,0,.45));animation:introPop 1s cubic-bezier(.2,.9,.3,1.25) both;}\n@keyframes introPop{0%{opacity:0;transform:scale(.55) rotate(-7deg);}60%{transform:scale(1.06) rotate(2deg);}100%{opacity:1;transform:scale(1) rotate(0);}}\n.intro-msg{color:#fff;font-size:clamp(1.25rem,3.4vw,2rem);font-weight:800;letter-spacing:-.01em;margin:24px auto 8px;max-width:16ch;text-wrap:balance;animation:introUp .7s .55s both;}\n.intro-sub{color:var(--fest-yellow);font-size:.9rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin:0;animation:introUp .7s .9s both;}\n@keyframes introUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}\n.intro-confetti{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}\n.confetti-piece{position:absolute;top:-24px;width:11px;height:15px;border-radius:2px;will-change:transform;animation-name:confFall;animation-timing-function:cubic-bezier(.35,.15,.6,1);animation-iteration-count:1;animation-fill-mode:forwards;}\n@keyframes confFall{0%{transform:translateY(-24px) rotate(0);opacity:1;}100%{transform:translateY(108vh) rotate(720deg);opacity:.9;}}\n@media (prefers-reduced-motion: reduce){\n  .intro-emblem,.intro-msg,.intro-sub{animation:none;}\n  .intro-bunting{animation:none;}\n  .confetti-piece{display:none;}\n}\n\n@media (prefers-reduced-motion: reduce){\n  *{animation-duration:.001ms !important;transition-duration:.001ms !important;}\n  .note,.note:nth-child(4n+2),.note:nth-child(4n+3),.note:nth-child(7n+1){transform:none !important;}\n  body{background-attachment:scroll;}\n}\n@media print{\n  .tools,.search-wrap,.chips,.skip,footer .links,.bunting{display:none !important;}\n  .note{break-inside:avoid;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<a class=\"skip\" href=\"#mural\">Pular para os bilhetes<\u002Fa>\n\n<!-- Animação de abertura (Arraiá) — só aparece com o mural liberado -->\n<div id=\"arraiaIntro\" class=\"intro\" hidden=\"\" aria-hidden=\"true\">\n  <div class=\"intro-bunting\" aria-hidden=\"true\">\n    <svg viewBox=\"0 0 120 26\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\"><g id=\"introFlags\"><\u002Fg><\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"intro-confetti\" id=\"introConfetti\" aria-hidden=\"true\"><\u002Fdiv>\n  <div class=\"intro-center\">\n    <img class=\"intro-emblem\" src=\"45eee321-18f5-4e90-b6cc-a2874aefa437\" alt=\"Arraiá da Synvia\">\n    <p class=\"intro-msg\">O mural do Elogio Elegante está aberto! 🎉<\u002Fp>\n    <p class=\"intro-sub\" id=\"introSub\">toque para entrar<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Bandeirinha (junina, discreta) -->\n<div class=\"bunting\" aria-hidden=\"true\">\n  <svg viewBox=\"0 0 120 26\" preserveAspectRatio=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n    <path d=\"M0 2 Q60 7 120 2\" stroke=\"rgba(246,241,223,.35)\" stroke-width=\"0.8\" fill=\"none\"><\u002Fpath>\n    <g id=\"flags\"><\u002Fg>\n  <\u002Fsvg>\n<\u002Fdiv>\n\n<header>\n  <div class=\"topbar\">\n    <div class=\"brand\">\n      <img src=\"689af8ef-ec92-4d73-99e5-f36cf5bac590\" alt=\"Synvia\">\n      <span class=\"div\" aria-hidden=\"true\"><\u002Fspan>\n      <span class=\"campaign\">Arraiá Synvia 2026<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"tools\">\n      <button class=\"btn\" id=\"telaoBtn\" title=\"Abrir o modo telão para exibir numa TV\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"><\u002Frect><line x1=\"8\" y1=\"21\" x2=\"16\" y2=\"21\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><\u002Fsvg>\n        Modo telão\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"topo\">\n  <section class=\"hero-stage\" ti-piece';\n        d.style.left=(Math.random()*100)+'%';\n        d.style.background=CONFETTI_COLORS[i%CONFETTI_COLORS.length];\n        d.style.animationDuration=(1.8+Math.random()*1.8)+'s';\n        d.style.animationDelay=(Math.random()*1.2)+'s';\n        d.style.opacity=(0.75+Math.random()*0.25).toFixed(2);\n        if(Math.random()<0.5) d.style.borderRadius='50%';\n        box.appendChild(d);\n      }\n    }\n  }\n\n  intro.hidden=false;\n  const dismiss=()=>{\n    intro.classList.add('out');\n    setTimeout(()=>{ intro.hidden=true; intro.classList.remove('out'); }, 700);\n    intro.removeEventListener('click',dismiss);\n  };\n  intro.addEventListener('click',dismiss);\n  setTimeout(dismiss, reduce ? 1200 : 3400);\n}\n\n/* ============ Utils ============ */\nconst norm = s => (s||'').toString().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').toLowerCase().trim();\nconst esc = s => (s||'').toString().replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\nconst isYes = s => /^(sim|s|y|yes|true|1|x|verdadeiro)$/i.test((s||'').toString().trim());\n\nfunction toast(msg){\n  const t=document.getElementById('toast');\n  t.textContent=msg;t.classList.add('show');\n  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);\n}\n\n/* ============ Robust CSV parser ============ */\nfunction parseCSV(text){\n  text = text.replace(/^\\uFEFF/,''); // strip BOM\n  // detect delimiter: comma vs semicolon (common in pt-BR Excel exports)\n  const head = text.slice(0, 2000);\n  const commas=(head.match(/,/g)||[]).length, semis=(head.match(/;/g)||[]).length;\n  const D = semis>commas ? ';' : ',';\n  const rows=[];let row=[];let field='';let i=0;let q=false;\n  while(i<text.length){\n    const c=text[i];\n    if(q){\n      if(c==='\"'){\n        if(text[i+1]==='\"'){field+='\"';i+=2;continue;}\n        q=false;i++;continue;\n      }\n      field+=c;i++;continue;\n    }\n    if(c==='\"'){q=true;i++;continue;}\n    if(c===D){row.push(field);field='';i++;continue;}\n    if(c==='\\r'){i++;continue;}\n    if(c==='\\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}\n    field+=c;i++;\n  }\n  if(field.length||row.length){row.push(field);rows.push(row);}\n  return rows.filter(r=>r.length && r.some(x=>x.trim()!==''));\n}\n\n/* ============ Column detection ============ */\nconst FIELD_DEFS = {\n  destinatario:{label:'Destinatário (quem recebe)', re:/destinat|para\\b|recebe|quem.*receb/, req:true},\n  setor:{label:'Setor / área', re:/setor|[aá]rea|departa|equipe|time/, req:false},\n  mensagem:{label:'Mensagem', re:/mensagem|recado|texto|bilhete|^msg|conte[uú]do|coment/, req:true},\n  remetente:{label:'Remetente (quem enviou)', re:/remetent|enviou|^de\\b|autor|assina|quem.*env/, req:false},\n  anonimo:{label:'Anônimo (Sim/Não)', re:/an[oô]nim/, req:false},\n  status:{label:'Status', re:/status|situa|aprova/, req:false}\n};\nfunction detectMap(headers){\n  const map={};const used=new Set();\n  for(const key in FIELD_DEFS){\n    const def=FIELD_DEFS[key];\n    let idx=headers.findIndex((h,i)=>!used.has(i)&&def.re.test(norm(h)));\n    if(idx>=0){map[key]=idx;used.add(idx);}else{map[key]=-1;}\n  }\n  return map;\n}\n\n/* ============ State ============ */\nlet ALL=[];           // approved notes {dest,setor,msg,sender,anon}\nlet activeSetor='__all';\nlet lastHeaders=[], lastRows=[];\n\n/* ============ Build records from rows + map ============ */\n// Prefixos (sem acento/minúsculo) dos Elogios Elegantes em destaque — filtrados da grade.\nconst ELEGANTES=[\n  'voce nao e o flash benef',\n  'voce e igual o vini jr',\n  'voce nao e parafuso',\n  'chefinha, voce e a prova viva'\n];\nfunction buildRecords(rows, map){\n  const body = rows.slice(1);\n  const out=[];\n  for(const r of body){\n    const get=k=> map[k]>=0 ? (r[map[k]]||'').trim() : '';\n    const dest=get('destinatario');\n    const msg=get('mensagem');\n    if(!dest && !msg) continue;\n    const statusRaw=get('status');\n    const approved = map.status<0 ? true : /aprovad/.test(norm(statusRaw));\n    if(!approved) continue;\n    // Os Elogios Elegantes têm card próprio em destaque — não repetir na grade.\n    const nm=norm(msg);\n    if(ELEGANTES.some(p=>nm.startsWith(p))) continue;\n    const anon = map.anonimo<0 ? false : isYes(get('anonimo'));\n    const rec={\n      dest, setor:get('setor')||'Synvia', msg,\n      sender: anon ? '' : get('remetente'),\n      anon\n    };\n    rec.id=noteId(rec);\n    out.push(rec);\n  }\n  return out;\n}\n\n/* ============ Render mural ============ */\nconst ANON_PHRASES=[\n  'de alguém que te admira',\n  'de um colega que torce por você',\n  'de alguém que aprende com você todo dia',\n  'de quem trabalha feliz do seu lado',\n  'de um admirador secreto do seu trabalho'\n];\nfunction anonPhrase(seed){\n  let h=0;for(let i=0;i<seed.length;i++)h=(h*31+seed.charCodeAt(i))>>>0;\n  return ANON_PHRASES[h%ANON_PHRASES.length];\n}\nfunction initials(name){\n  const p=name.trim().split(/\\s+/);\n  return ((p[0]?.[0]||'')+(p.length>1?p[p.length-1][0]:'')).toUpperCase()||'♥';\n}\n\n/* ============ Reações (curtidas com emoji) — CONTAGEM COLETIVA ============ */\n// ┌──────────────────────────────────────────────────────────────────────┐\n// │  CONTAGEM COLETIVA REAL (todos veem o mesmo número, somando ao vivo).   │\n// │  Passo a passo (grátis, ~5 min, sem login pros colaboradores):         │\n// │   1. Acesse console.firebase.google.com e crie um projeto.             │\n// │   2. Menu \"Realtime Database\" → Criar banco de dados → modo de teste.   │\n// │   3. Nas configurações do projeto (⚙️), copie o objeto firebaseConfig.  │\n// │   4. Cole os valores abaixo (databaseURL é o essencial).                │\n// │  Enquanto não preencher, a contagem funciona LOCAL (por dispositivo).   │\n// └──────────────────────────────────────────────────────────────────────┘\nconst REACTION_FIREBASE = {\n  apiKey: \"\",\n  authDomain: \"\",\n  databaseURL: \"https://contagem-de-likes-default-rtdb.firebaseio.com\",   // contagem coletiva ao vivo\n  projectId: \"contagem-de-likes\"\n};\n\nconst EMOJIS=['❤️','🔥','👏','🤗'];\nconst EMOJI_SLUG={'❤️':'heart','🔥':'fire','👏':'clap','🤗':'hug'};\nconst SLUG_EMOJI=Object.fromEntries(Object.entries(EMOJI_SLUG).map(([e,s])=>[s,e]));\nconst RKEY='esquenta_reacoes_v1', MKEY='esquenta_minhas_reacoes_v1';\nfunction loadJSON(k){try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return {};}}\nlet REACTS={}, MINE=loadJSON(MKEY);\nconst RB={mode:'local'};\nfunction saveReacts(){try{localStorage.setItem(RKEY,JSON.stringify(REACTS));localStorage.setItem(MKEY,JSON.stringify(MINE));}catch(e){}}\nfunction saveMine(){try{localStorage.setItem(MKEY,JSON.stringify(MINE));}catch(e){}}\nfunction noteId(n){\n  const s=n.dest+'|'+n.msg+'|'+(n.sender||'')+'|'+n.setor;\n  let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;\n  return 'b'+h.toString(36);\n}\nfunction reactionRow(n){\n  const counts=REACTS[n.id]||{}, mine=MINE[n.id]||[];\n  const btns=EMOJIS.map(e=>{\n    const c=counts[e]||0, on=mine.includes(e);\n    return `<button type=\"button\" class=\"react-btn${on?' on':''}\" data-emoji=\"${e}\" aria-pressed=\"${on}\" aria-label=\"Reagir com ${e}\"><span class=\"re\">${e}<\u002Fspan><span class=\"rc\"${c>0?'':' hidden'}>${c||''}<\u002Fspan><\u002Fbutton>`;\n  }).join('');\n  return `<div class=\"reactions\" data-id=\"${n.id}\" role=\"group\" aria-label=\"Reagir a este elogio\">${btns}<\u002Fdiv>`;\n}\n// Atualiza os contadores/estados no DOM sem re-renderizar tudo (usado no modo ao vivo).\nfunction refreshReactionDOM(){\n  document.querySelectorAll('.reactions').forEach(row=>{\n    const id=row.dataset.id, counts=REACTS[id]||{}, mine=MINE[id]||[];\n    row.querySelectorAll('.react-btn').forEach(btn=>{\n      const e=btn.dataset.emoji, c=counts[e]||0, on=mine.includes(e);\n      btn.classList.toggle('on',on); btn.setAttribute('aria-pressed',on);\n      const rc=btn.querySelector('.rc');\n      if(rc){ rc.textContent=c||''; rc.hidden=!(c>0); }\n    });\n  });\n}\nfunction loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}\nasync function initReactions(){\n  const cfg=REACTION_FIREBASE;\n  if(!cfg || !cfg.databaseURL || !/^https?:\\/\\//.test(cfg.databaseURL)){\n    // Sem backend configurado → contagem local por dispositivo.\n    REACTS=loadJSON(RKEY); RB.mode='local'; refreshReactionDOM(); return;\n  }\n  try{\n    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');\n    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');\n    firebase.initializeApp(cfg);\n    RB.db=firebase.database(); RB.mode='firebase';\n    RB.db.ref('reactions').on('value',snap=>{\n      const val=snap.val()||{}; const next={};\n      for(const id in val){ next[id]={}; for(const slug in val[id]){ const emo=SLUG_EMOJI[slug]; if(emo) next[id][emo]=val[id][slug]; } }\n      REACTS=next; refreshReactionDOM();\n    });\n  }catch(err){\n    console.warn('Reações: Firebase indisponível — usando contagem local.',err);\n    REACTS=loadJSON(RKEY); RB.mode='local'; refreshReactionDOM();\n  }\n}\nfunction highlight(text, q){\n  if(!q) return esc(text);\n  const nt=norm(text), nq=norm(q);\n  let res='',ti=0; // map normalized positions back is tricky w/ diacritics; do simple per-char walk\n  // Build normalized index -> original index map\n  const map=[];let acc='';\n  for(let i=0;i<text.length;i++){const nc=norm(text[i]);for(let k=0;k<nc.length;k++)map.push(i);acc+=nc;}\n  let out='';let pos=0;\n  while(true){\n    const f=acc.indexOf(nq,pos);\n    if(f<0||!nq){out+=esc(text.slice(map[pos]??text.length));break;}\n    const start=map[f], end=(map[f+nq.length-1]??text.length-1)+1;\n    out+=esc(text.slice(map[pos]??0,start))+'<mark>'+esc(text.slice(start,end))+'<\u002Fmark>';\n    pos=f+nq.length;\n    if(pos>=acc.length){break;}\n  }\n  return out;\n}\n\nfunction currentFiltered(){\n  const q=document.getElementById('search').value.trim();\n  return ALL.filter(n=>{\n    if(activeSetor!=='__all' && n.setor!==activeSetor) return false;\n    if(q && !norm(n.dest).includes(norm(q))) return false;\n    return true;\n  });\n}\n\nfunction orderedSetores(counts){\n  const all=Object.keys(counts);\n  const pin='Toda a Synvia';\n  const rest=all.filter(s=>s!==pin).sort((a,b)=>a.localeCompare(b,'pt-BR'));\n  return all.includes(pin) ? [pin,...rest] : rest;\n}\nfunction setActiveSetor(s){\n  activeSetor=s;\n  const sel=document.getElementById('areaSelect');\n  if(sel && sel.value!==s) sel.value=s;\n  renderChips(); render();\n  const mural=document.getElementById('mural');\n}\nfunction renderChips(){\n  const wrap=document.getElementById('chips');\n  const counts={};\n  ALL.forEach(n=>counts[n.setor]=(counts[n.setor]||0)+1);\n  const setores=orderedSetores(counts);\n  // Seletor \"Sua área\"\n  const sel=document.getElementById('areaSelect');\n  if(sel){\n    sel.innerHTML=`<option value=\"__all\">Todas as áreas (${ALL.length})<\u002Foption>`+\n      setores.map(s=>`<option value=\"${esc(s)}\">${esc(s)} (${counts[s]})<\u002Foption>`).join('');\n    sel.value=activeSetor;\n    if(!sel._wired){ sel.addEventListener('change',()=>setActiveSetor(sel.value)); sel._wired=true; }\n  }\n  // Chips (opcional — removidos da UI, mantido por compatibilidade)\n  if(wrap){\n    let html=`<button class=\"chip\" data-setor=\"__all\" aria-pressed=\"${activeSetor==='__all'}\">Todas <span class=\"n\">${ALL.length}<\u002Fspan><\u002Fbutton>`;\n    setores.forEach(s=>{\n      html+=`<button class=\"chip\" data-setor=\"${esc(s)}\" aria-pressed=\"${activeSetor===s}\">${esc(s)} <span class=\"n\">${counts[s]}<\u002Fspan><\u002Fbutton>`;\n    });\n    wrap.innerHTML=html;\n    wrap.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{\n      setActiveSetor(c.dataset.setor);\n    }));\n  }\n}\n\nfunction render(){\n  const q=document.getElementById('search').value.trim();\n  const list=currentFiltered();\n  const notes=document.getElementById('notes');\n  const empty=document.getElementById('emptyState');\n  const counter=document.getElementById('counter');\n\n  // counter copy\n  if(q){\n    if(list.length>0){\n      counter.innerHTML=`<span class=\"heat\">${list.length}<\u002Fspan> elogio${list.length>1?'s':''} aquecendo pra <b>${esc(q)}<\u002Fb> 🔥`;\n    }else{\n      counter.innerHTML=`Nenhum elogio encontrado para <b>${esc(q)}<\u002Fb> ainda…`;\n    }\n  }else{\n    counter.innerHTML=`<b>${list.length}<\u002Fb> elogio${list.length!==1?'s':''} elegante${list.length!==1?'s':''} ${activeSetor==='__all'?'no mural':'em '+esc(activeSetor)} 🧡`;\n  }\n\n  if(list.length===0){\n    notes.innerHTML='';\n    empty.style.display='block';\n    empty.innerHTML = q\n      ? `<img class=\"ill\" src=\"${(window.__resources&&window.__resources.chapeu)||'assets/chapeu.png'}\" alt=\"\" aria-hidden=\"true\" />\n         <h2>Ainda não achamos um recado pra esse nome<\u002Fh2>\n         <p>Tente escrever só o primeiro nome, conferir o acento, ou navegue pelo seu setor. Quem sabe o carinho chegou com um apelido?<\u002Fp>\n         <button class=\"btn btn-primary\" onclick=\"document.getElementById('search').value='';document.getElementById('searchBox').classList.remove('has-value');render();document.getElementById('search').focus();\">Limpar busca<\u002Fbutton>`\n      : `<img class=\"ill\" src=\"${(window.__resources&&window.__resources.milho)||'assets/milho.png'}\" alt=\"\" aria-hidden=\"true\" />\n         <h2>O varal ainda está vazio por aqui<\u002Fh2>\n         <p>Assim que os bilhetes forem aprovados, eles aparecem neste mural pra todo mundo ler.<\u002Fp>`;\n    return;\n  }\n  empty.style.display='none';\n  notes.innerHTML=list.map(n=>{\n    if(n.official){\n      return `<div class=\"note official\">\n        <div class=\"card\">\n          <div class=\"card-top\">\n            <p class=\"para\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3 1.2 4 2.5 1-1.3 2-2.5 4-2.5 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21Z\"/><\u002Fsvg> Para<\u002Fp>\n            <span class=\"official-ribbon\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M12 2l2.9 6.2 6.6.8-4.9 4.5 1.3 6.5L12 17.8 6.1 20.5l1.3-6.5L2.5 9l6.6-.8z\"/><\u002Fsvg> Recado oficial<\u002Fspan>\n          <\u002Fdiv>\n          <h3 class=\"dest\">${highlight(n.dest,q)}<\u002Fh3>\n          <p class=\"msg\">${esc(n.msg)}<\u002Fp>\n          <div class=\"from official-from\">\n            <span class=\"av official-av\" aria-hidden=\"true\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2 4 5v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V5l-8-3Z\"/><\u002Fsvg>\n            <\u002Fspan>\n            <span class=\"who\">de <b>${esc(n.sender)}<\u002Fb><\u002Fspan>\n          <\u002Fdiv>\n          ${reactionRow(n)}\n        <\u002Fdiv>\n      <\u002Fdiv>`;\n    }\n    const who = n.anon\n      ? `<span class=\"who anon\">${esc(anonPhrase(n.dest+n.msg))}<\u002Fspan>`\n      : `<span class=\"who\">de <b>${esc(n.sender||'um colega')}<\u002Fb><\u002Fspan>`;\n    return `<div class=\"note\">\n      <svg class=\"pin\" viewBox=\"0 0 54 22\" fill=\"none\" aria-hidden=\"true\"><path d=\"M27 3v8\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"/><circle cx=\"27\" cy=\"4\" r=\"4\" fill=\"currentColor\"/><path d=\"M19 11h16l-2 8H21z\" fill=\"currentColor\" opacity=\".22\"/><\u002Fsvg>\n      <div class=\"card\">\n        <div class=\"card-top\">\n          <p class=\"para\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3 1.2 4 2.5 1-1.3 2-2.5 4-2.5 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21Z\"/><\u002Fsvg> Para<\u002Fp>\n          <span class=\"tag-setor\">${esc(n.setor)}<\u002Fspan>\n        <\u002Fdiv>\n        <h3 class=\"dest\">${highlight(n.dest,q)}<\u002Fh3>\n        <p class=\"msg\">${esc(n.msg)}<\u002Fp>\n        <p class=\"from\">${who}<\u002Fp>\n        ${reactionRow(n)}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  revealCards(!q);\n}\n\n/* Entrada dos cartões: revela ao rolar (com stagger). Durante busca, mostra na hora.\n   Failsafe: se o observer não disparar, os cartões aparecem mesmo assim. */\nlet _io=null, _revealTimer=null;\nfunction revealCards(animate){\n  document.body.classList.add('anim-ready');\n  const notes=document.getElementById('notes');\n  const cards=[...notes.querySelectorAll('.card')];\n  clearTimeout(_revealTimer);\n  if(!animate || reduceMotion || !('IntersectionObserver' in window)){\n    if(_io) _io.disconnect();\n    cards.forEach(c=>{c.style.transitionDelay='0ms';c.classList.add('in');});\n    return;\n  }\n  if(!_io){\n    _io=new IntersectionObserver(entries=>{\n      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); _io.unobserve(e.target); } });\n    },{rootMargin:'0px 0px -6% 0px', threshold:0.06});\n  }else{ _io.disconnect(); }\n  const vh=window.innerHeight||800;\n  cards.forEach((c,i)=>{\n    c.classList.remove('in');\n    c.style.transitionDelay=(Math.min(i,10)*45)+'ms';\n    // Revela imediatamente o que já está na viewport (não depende do 1º disparo do observer)\n    const top=c.getBoundingClientRect().top;\n    if(top < vh*0.95){ requestAnimationFrame(()=>c.classList.add('in')); }\n    else { _io.observe(c); }\n  });\n  // Rede de segurança: garante que nada fique invisível se o observer falhar.\n  _revealTimer=setTimeout(()=>{ cards.forEach(c=>c.classList.add('in')); }, 1600);\n}\n\n/* ============ Load pipeline ============ */\nfunction ingest(text, source){\n  const rows=parseCSV(text);\n  if(rows.length<2){toast('A planilha parece vazia.');return;}\n  lastRows=rows;lastHeaders=rows[0];\n  const map=detectMap(lastHeaders);\n  if(map.destinatario<0 || map.mensagem<0){\n    openMapping(map);\n    return;\n  }\n  applyMap(map, source);\n}\nfunction applyMap(map, source){\n  ALL=buildRecords(lastRows, map);\n  // Recado oficial da Synvia — sempre em primeiro, endereçado a toda a empresa.\n  const oficial={\n    official:true,\n    dest:'Toda a Synvia',\n    setor:'Toda a Synvia',\n    msg:'Agradecemos a cada pessoa que participou do Elogio Elegante e ajudou a espalhar gentileza pela empresa.\\n\\nMas o recado de hoje vai além do agradecimento: é também um reconhecimento.\\n\\nA dedicação para esta ação, assim como em tudo o que fazemos aqui, mostra na prática o que nos move: o protagonismo de quem toma a iniciativa, a integridade de quem reconhece o outro com sinceridade, a inovação de transformar uma brincadeira de festa junina em cultura e a excelência no cuidado com cada detalhe.\\n\\nNão foi sorte de barraca de pescaria. Foi trabalho, envolvimento e dedicação de gente que veste a camisa, seja ela xadrez ou não.\\n\\nQue a gentileza siga firme muito além do Arraiá.\\nCom carinho,\\nviva a Synvia! 💚',\n    sender:'Comunicação & Marketing · Synvia',\n    anon:false\n  };\n  oficial.id='oficial-synvia';\n  ALL.unshift(oficial);\n  document.getElementById('loadingState').style.display='none';\n  renderChips();render();\n  if(source==='import') toast(`${ALL.length} bilhete(s) aprovado(s) importado(s).`);\n}\n\n/* ============ Mapping modal ============ */\nfunction openMapping(detected){\n  const rowsEl=document.getElementById('mapRows');\n  const opts=['<option value=\"-1\">— nenhuma —<\u002Foption>']\n    .concat(lastHeaders.map((h,i)=>`<option value=\"${i}\">${esc(h||('Coluna '+(i+1)))}<\u002Foption>`)).join('');\n  rowsEl.innerHTML=Object.keys(FIELD_DEFS).map(key=>{\n    const d=FIELD_DEFS[key];\n    return `<div class=\"maprow\">\n      <label for=\"map_${key}\">${d.label}${d.req?' *':''}<\u002Flabel>\n      <select id=\"map_${key}\" data-key=\"${key}\">${opts}<\u002Fselect>\n    <\u002Fdiv>`;\n  }).join('');\n  Object.keys(FIELD_DEFS).forEach(key=>{\n    document.getElementById('map_'+key).value=String(detected[key]??-1);\n  });\n  const m=document.getElementById('mapModal');m.classList.add('open');\n  document.getElementById('map_destinatario').focus();\n}\ndocument.getElementById('mapApply').addEventListener('click',()=>{\n  const map={};\n  Object.keys(FIELD_DEFS).forEach(key=>{map[key]=parseInt(document.getElementById('map_'+key).value,10);});\n  if(map.destinatario<0||map.mensagem<0){toast('Selecione ao menos Destinatário e Mensagem.');return;}\n  document.getElementById('mapModal').classList.remove('open');\n  applyMap(map,'import');\n});\ndocument.getElementById('mapCancel').addEventListener('click',()=>{\n  document.getElementById('mapModal').classList.remove('open');\n  document.getElementById('loadingState').style.display='none';\n});\n\n/* ============ Search + clear ============ */\nconst searchEl=document.getElementById('search');\nconst searchBox=document.getElementById('searchBox');\nsearchEl.addEventListener('input',()=>{\n  searchBox.classList.toggle('has-value', searchEl.value.length>0);\n  render();\n});\ndocument.getElementById('clearBtn').addEventListener('click',()=>{\n  searchEl.value='';searchBox.classList.remove('has-value');render();searchEl.focus();\n});\n\n/* ============ Reações: clique delegado ============ */\ndocument.getElementById('notes').addEventListener('click',e=>{\n  const btn=e.target.closest('.react-btn'); if(!btn)return;\n  const row=btn.closest('.reactions'); if(!row)return;\n  const id=row.dataset.id, emoji=btn.dataset.emoji;\n  MINE[id]=MINE[id]||[];\n  const idx=MINE[id].indexOf(emoji);\n  const delta = idx>=0 ? -1 : 1;\n  // Estado pessoal (por dispositivo)\n  if(idx>=0){ MINE[id].splice(idx,1); btn.classList.remove('on'); btn.setAttribute('aria-pressed','false'); }\n  else{ MINE[id].push(emoji); btn.classList.add('on'); btn.setAttribute('aria-pressed','true'); btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop'); }\n  saveMine();\n  // Contagem coletiva\n  if(RB.mode==='firebase'){\n    // Incremento atômico no servidor; o snapshot ao vivo atualiza o número exato.\n    const slug=EMOJI_SLUG[emoji];\n    try{ RB.db.ref(`reactions/${id}/${slug}`).set(firebase.database.ServerValue.increment(delta)); }catch(err){ console.warn(err); }\n    // Atualização otimista imediata\n    REACTS[id]=REACTS[id]||{}; REACTS[id][emoji]=Math.max(0,(REACTS[id][emoji]||0)+delta);\n  }else{\n    REACTS[id]=REACTS[id]||{}; REACTS[id][emoji]=Math.max(0,(REACTS[id][emoji]||0)+delta);\n    saveReacts();\n  }\n  const c=REACTS[id][emoji]||0;\n  const rc=btn.querySelector('.rc');\n  if(rc){ rc.textContent=c||''; rc.hidden=!(c>0); }\n});\n\n/* ============ Import ============ */\nconst fileInput=document.getElementById('fileInput');\nfunction triggerImport(){fileInput.click();}\nconst importBtnEl=document.getElementById('importBtn');\nif(importBtnEl) importBtnEl.addEventListener('click',triggerImport);\nconst importLinkEl=document.getElementById('importLink');\nif(importLinkEl) importLinkEl.addEventListener('click',e=>{e.preventDefault();triggerImport();});\nfileInput.addEventListener('change',e=>{\n  const f=e.target.files[0];if(!f)return;\n  const r=new FileReader();\n  r.onload=()=>{\n    revealForImport();\n    document.getElementById('loadingState').style.display='none';\n    ingest(r.result,'import');\n  };\n  r.readAsText(f,'utf-8');\n  fileInput.value='';\n});\n\n/* ============ Telão mode ============ */\nconst telao=document.getElementById('telao');\nlet tList=[],tIdx=0,tTimer=null,tStart=0,tPaused=false,tRaf=null;\nconst T_DUR=7000;\nconst reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;\n\nfunction openTelao(){\n  tList=currentFiltered();\n  if(tList.length===0){toast('Nada pra exibir no telão ainda.');return;}\n  tIdx=0;telao.classList.add('open');\n  if(telao.requestFullscreen) telao.requestFullscreen().catch(()=>{});\n  tPaused=false;updatePlayIcon();\n  showTelao(0);\n  document.getElementById('tClose').focus();\n}\nfunction closeTelao(){\n  telao.classList.remove('open');\n  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});\n  cancelAnimationFrame(tRaf);clearTimeout(tTimer);\n}\nfunction showTelao(i){\n  if(tList.length===0)return;\n  tIdx=(i+tList.length)%tList.length;\n  const n=tList[tIdx];\n  const card=document.getElementById('telaoCard');\n  const sender = n.anon ? anonPhrase(n.dest+n.msg) : ('de '+(n.sender||'um colega'));\n  card.innerHTML=`\n    <div class=\"tpara\">Para<\u002Fdiv>\n    <div class=\"tdest\">${esc(n.dest)}<\u002Fdiv>\n    <div class=\"tmsg\">${esc(n.msg)}<\u002Fdiv>\n    <div class=\"tsender\"><b>${esc(sender)}<\u002Fb> · ${esc(n.setor)}<\u002Fdiv>`;\n  if(!reduceMotion){card.classList.remove('fade');void card.offsetWidth;card.classList.add('fade');}\n  document.getElementById('tCount').textContent=`${tIdx+1} / ${tList.length}`;\n  startProgress();\n}\nfunction startProgress(){\n  cancelAnimationFrame(tRaf);clearTimeout(tTimer);\n  const prog=document.getElementById('tProg');\n  if(tPaused){return;}\n  tStart=performance.now();\n  const step=now=>{\n    const p=Math.min(1,(now-tStart)/T_DUR);\n    prog.style.width=(p*100)+'%';\n    if(p<1){tRaf=requestAnimationFrame(step);}else{showTelao(tIdx+1);}\n  };\n  tRaf=requestAnimationFrame(step);\n}\nfunction updatePlayIcon(){\n  document.getElementById('tPlay').innerHTML = tPaused\n    ? '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><polygon points=\"6 4 20 12 6 20 6 4\"/><\u002Fsvg>'\n    : '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\"><rect x=\"6\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"/><rect x=\"14\" y=\"5\" width=\"4\" height=\"14\" rx=\"1\"/><\u002Fsvg>';\n}\ndocument.getElementById('telaoBtn').addEventListener('click',openTelao);\ndocument.getElementById('tClose').addEventListener('click',closeTelao);\ndocument.getElementById('tPrev').addEventListener('click',()=>showTelao(tIdx-1));\ndocument.getElementById('tNext').addEventListener('click',()=>showTelao(tIdx+1));\ndocument.getElementById('tPlay').addEventListener('click',()=>{\n  tPaused=!tPaused;updatePlayIcon();\n  if(tPaused){cancelAnimationFrame(tRaf);}else{startProgress();}\n});\ndocument.addEventListener('keydown',e=>{\n  if(!telao.classList.contains('open'))return;\n  if(e.key==='Escape')closeTelao();\n  else if(e.key==='ArrowRight')showTelao(tIdx+1);\n  else if(e.key==='ArrowLeft')showTelao(tIdx-1);\n  else if(e.key===' '){e.preventDefault();document.getElementById('tPlay').click();}\n});\ndocument.addEventListener('fullscreenchange',()=>{\n  if(!document.fullscreenElement && telao.classList.contains('open')){\n    telao.classList.remove('open');cancelAnimationFrame(tRaf);\n  }\n});\n\n/* ============ Abertura programada do mural ============ */\n// ⬇️  AJUSTE AQUI a data e hora de abertura (horário de Brasília).\n//     Antes dessa data o mural fica \"fechadinho\" com contagem regressiva.\n//     Depois dela, a planilha bilhetes.csv é carregada e a busca libera.\nconst ABERTURA = new Date('2026-07-06T08:00:00-03:00');\n\nlet revealed = false;\nlet cdInt = null;\nconst $ = id => document.getElementById(id);\n\nfunction muralAberto(){ return revealed || Date.now() >= ABERTURA.getTime(); }\n\nfunction setPreOpening(on){\n  $('searchWrap').hidden = on;\n  $('countdown').hidden = !on;\n  document.querySelector('.controls').style.display = on ? 'none' : '';\n  $('mural').style.display = on ? 'none' : '';\n  $('telaoBtn').style.display = on ? 'none' : '';\n  const title=$('heroTitle');\n  if(title){\n    title.innerHTML = on\n      ? 'Em breve, um novo mural <span class=\"warm\">pro cês vê<\u002Fspan>.'\n      : 'Será que tem <span class=\"warm\">elogio<\u002Fspan> pra você?';\n  }\n  $('heroLead').textContent = on\n    ? 'Os Elogios Elegantes já foram escolhidos! Na segunda o mural abre e todo mundo vai poder buscar o próprio nome e ler os recados de carinho.'\n    : 'Digite seu nome e descubra os Elogios Elegantes que colegas escreveram pra você.';\n}\n\nfunction startCountdown(){\n  setPreOpening(true);\n  try{\n    const fmt=new Intl.DateTimeFormat('pt-BR',{weekday:'long',day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});\n    $('cdDateLabel').textContent=fmt.format(ABERTURA).replace(' às ',' · ');\n  }catch(e){}\n  const tick=()=>{\n    const diff=ABERTURA.getTime()-Date.now();\n    if(diff<=0){ clearInterval(cdInt); reveal(); return; }\n    const d=Math.floor(diff/86400000),\n          h=Math.floor(diff%86400000/3600000),\n          m=Math.floor(diff%3600000/60000),\n          s=Math.floor(diff%60000/1000);\n    const unit=(n,l)=>`<div class=\"cd-unit\"><div class=\"cd-num\">${String(n).padStart(2,'0')}<\u002Fdiv><div class=\"cd-lbl\">${l}<\u002Fdiv><\u002Fdiv>`;\n    $('cdTimer').innerHTML=unit(d,'dias')+unit(h,'horas')+unit(m,'min')+unit(s,'seg');\n  };\n  tick(); cdInt=setInterval(tick,1000);\n}\n\nfunction reveal(){\n  if(revealed) return;\n  revealed=true;\n  if(cdInt) clearInterval(cdInt);\n  setPreOpening(false);\n  setupWinner();\n  loadData();\n  playIntro(true);\n  setTimeout(()=>$('search').focus(),100);\n}\n\n/* ============ Bilhete Vencedor: lacre até a revelação ============ */\nfunction setupWinner(){\n  const card=$('winnerCard'); if(!card) return;\n  if(muralAberto()){\n    card.classList.remove('locked');\n    card.classList.add('revealed');\n    return;\n  }\n  card.classList.add('locked');\n  card.classList.remove('revealed');\n  const lock=$('winnerLock');\n  const tease=()=>{\n    card.classList.add('peeking');\n    setTimeout(()=>card.classList.remove('peeking'),450);\n    toast('Sem espiar! 👀 A revelação é na segunda.');\n  };\n  card.querySelectorAll('.winner-quote').forEach(q=>{\n    if(!q._wired){ q.addEventListener('click',tease); q._wired=true; }\n  });\n  if(lock && !lock._wired){ lock.addEventListener('click',tease); lock._wired=true; }\n}\n\n// Importação manual libera o mural na hora (uso dos organizadores).\nfunction revealForImport(){\n  revealed=true;\n  if(cdInt) clearInterval(cdInt);\n  setPreOpening(false);\n  setupWinner();\n}\n\nasync function loadData(){\n  $('loadingState').style.display='block';\n  try{\n    const res=await fetch('bilhetes.csv',{cache:'no-store'});\n    if(!res.ok) throw new Error('http '+res.status);\n    const txt=await res.text();\n    ingest(txt,'auto');\n  }catch(err){\n    const fb=document.getElementById('csvFallback');\n    if(fb && fb.textContent.trim().length>40){ ingest(fb.textContent.trim(),'auto'); return; }\n    $('loadingState').innerHTML=\n      `<img class=\"ill\" src=\"${(window.__resources&&window.__resources.milho)||'assets/milho.png'}\" alt=\"\" aria-hidden=\"true\" />\n       <h2>Não encontramos a planilha automaticamente<\u002Fh2>\n       <p>Coloque um arquivo <b>bilhetes.csv<\u002Fb> ao lado deste site, ou importe a planilha manualmente agora.<\u002Fp>\n       <button class=\"btn btn-primary\" onclick=\"document.getElementById('fileInput').click()\">Importar CSV<\u002Fbutton>`;\n  }\n}\n\n/* ============ Boot ============ */\n// Link do formulário para escrever um bilhete (Microsoft Forms)\nconst FORM_URL='https://forms.office.com/pages/responsepage.aspx?id=BrXh_rYkSkSRnoPflELcXUdVD5LOqtVFjJsnVPvhe8hUMDVPTjIwSFpEQ1RZVE9XNExHMTEzNzVTMy4u&route=shorturl';\ndocument.querySelectorAll('[data-write-link]').forEach(a=>{a.href=FORM_URL;});\n\nsetupWinner();\ninitReactions();\nif(muralAberto()){ setPreOpening(false); loadData(); playIntro(false); }\nelse { startCountdown(); }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
